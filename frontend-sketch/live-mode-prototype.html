<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>澪号 · LIVE 模式</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep: #0a0a10;
    --bg-panel: rgba(12, 12, 28, 0.75);
    --border-subtle: rgba(255, 255, 255, 0.06);
    --text-primary: #e8e6f0;
    --text-secondary: #9b97b0;
    --text-muted: #636078;
    --accent: #c4a0ff;
    --accent-glow: rgba(196, 160, 255, 0.3);
    --live-red: #ff3b5c;
    --glass: rgba(16, 14, 28, 0.6);
    --chat-bg: rgba(8, 6, 20, 0.5);
    --radius: 12px;
  }

  body {
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    height: 100vh; width: 100vw;
    overflow: hidden;
    user-select: none;
  }

  /* ══════════════════════════════════════════════════════
     LIVE 模式主布局
     ══════════════════════════════════════════════════════ */
  .live-stage {
    display: grid;
    grid-template-columns: 3fr 1fr;
    grid-template-rows: 1fr 56px;
    height: 100vh;
    width: 100vw;
    position: relative;
    overflow: hidden;
  }

  /* ══════════════════════════════════════════════════════
     中央 Live2D 展示区
     ══════════════════════════════════════════════════════ */
  .live-viewport {
    grid-row: 1; grid-column: 1;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(ellipse at 50% 40%, rgba(196, 160, 255, 0.04) 0%, transparent 70%),
      radial-gradient(ellipse at 50% 60%, rgba(140, 120, 200, 0.06) 0%, transparent 60%),
      var(--bg-deep);
    overflow: hidden;
  }

  .live-viewport::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 50% 50%, rgba(196,160,255,0.02) 0%, transparent 50%);
    pointer-events: none;
  }

  /* 粒子/氛围光 */
  .atmosphere {
    position: absolute; inset: 0; pointer-events: none;
  }
  .particle {
    position: absolute;
    width: 3px; height: 3px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0;
    animation: float-up 6s infinite;
  }
  .particle:nth-child(1) { left: 20%; bottom: 0; animation-delay: 0s; }
  .particle:nth-child(2) { left: 45%; bottom: 10%; animation-delay: 1.5s; }
  .particle:nth-child(3) { left: 70%; bottom: 5%; animation-delay: 3s; }
  .particle:nth-child(4) { left: 55%; bottom: 0; animation-delay: 4.5s; }
  .particle:nth-child(5) { left: 30%; bottom: 15%; animation-delay: 2s; }
  @keyframes float-up {
    0%   { opacity: 0; transform: translateY(0) scale(1); }
    20%  { opacity: 0.6; }
    80%  { opacity: 0.1; }
    100% { opacity: 0; transform: translateY(-400px) scale(0.3); }
  }

  /* 角色站位区提示环 */
  .live-stage-ring {
    position: absolute;
    width: 320px; height: 320px;
    border-radius: 50%;
    border: 1px solid rgba(196, 160, 255, 0.1);
    box-shadow:
      0 0 60px rgba(196, 160, 255, 0.05),
      inset 0 0 60px rgba(196, 160, 255, 0.03);
  }

  /* ══════════════════════════════════════════════════════
     LIVE 角标
     ══════════════════════════════════════════════════════ */
  .live-badge {
    position: absolute; top: 20px; left: 24px;
    display: flex; align-items: center; gap: 8px;
    z-index: 10;
  }
  .live-dot {
    width: 10px; height: 10px;
    background: var(--live-red);
    border-radius: 50%;
    animation: pulse-dot 1.5s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 59, 92, 0.5); }
    50%      { box-shadow: 0 0 0 8px rgba(255, 59, 92, 0); }
  }
  .live-text {
    font-size: 15px; font-weight: 700;
    letter-spacing: 3px;
    color: #fff;
    text-shadow: 0 0 12px rgba(255, 59, 92, 0.4);
  }
  .live-viewers {
    font-size: 12px; color: var(--text-secondary);
    margin-left: 4px;
  }

  /* ══════════════════════════════════════════════════════
     右侧聊天栏 —— 弹幕风格
     ══════════════════════════════════════════════════════ */
  .chat-sidebar {
    grid-row: 1 / 3; grid-column: 2;
    display: flex; flex-direction: column;
    background: var(--bg-panel);
    border-left: 1px solid var(--border-subtle);
    backdrop-filter: blur(20px);
    overflow: hidden;
    z-index: 2;
  }
  .chat-header {
    padding: 18px 20px 10px;
    font-size: 13px; font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 2px;
  }
  .chat-stream {
    flex: 1;
    overflow-y: auto;
    padding: 0 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .chat-stream::-webkit-scrollbar { width: 3px; }
  .chat-stream::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  .chat-msg {
    font-size: 13px; line-height: 1.5;
    padding: 8px 12px;
    border-radius: 8px;
    animation: msg-in 0.3s ease-out;
    word-break: break-word;
  }
  @keyframes msg-in {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .chat-msg.user {
    align-self: flex-end;
    background: rgba(196, 160, 255, 0.1);
    color: var(--text-primary);
    max-width: 92%;
  }
  .chat-msg.assistant {
    align-self: flex-start;
    background: rgba(255, 255, 255, 0.04);
    color: var(--text-secondary);
    max-width: 95%;
  }
  .chat-msg .role-tag {
    font-size: 10px; font-weight: 600;
    margin-bottom: 3px;
    opacity: 0.6;
    letter-spacing: 1px;
  }
  .chat-msg .msg-time {
    font-size: 9px;
    opacity: 0.35;
    margin-top: 4px;
    text-align: right;
  }

  /* 输入区 */
  .chat-input-wrap {
    padding: 12px 16px;
    border-top: 1px solid var(--border-subtle);
    display: flex; gap: 8px;
  }
  .chat-input-wrap input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 10px 16px;
    color: var(--text-primary);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    user-select: text;
  }
  .chat-input-wrap input:focus {
    border-color: rgba(196, 160, 255, 0.3);
  }
  .chat-input-wrap input::placeholder {
    color: rgba(255,255,255,0.16);
  }
  .chat-input-wrap button {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, rgba(196,160,255,0.3), rgba(140,120,200,0.2));
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.15s, background 0.2s;
  }
  .chat-input-wrap button:hover {
    transform: scale(1.05);
    background: linear-gradient(135deg, rgba(196,160,255,0.5), rgba(140,120,200,0.35));
  }

  /* ══════════════════════════════════════════════════════
     底部状态栏
     ══════════════════════════════════════════════════════ */
  .bottom-bar {
    grid-row: 2; grid-column: 1;
    display: flex; align-items: center; gap: 24px;
    padding: 0 24px;
    background: rgba(8, 6, 18, 0.85);
    border-top: 1px solid var(--border-subtle);
    backdrop-filter: blur(12px);
    z-index: 3;
  }
  .bottom-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text-secondary);
  }
  .bottom-item .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #4ade80;
  }
  .bottom-item .label {
    color: var(--text-muted);
    font-size: 11px;
  }
  .bottom-spacer { flex: 1; }
  .bottom-expression {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--accent);
    padding: 4px 10px;
    border-radius: 12px;
    background: rgba(196, 160, 255, 0.08);
    border: 1px solid rgba(196, 160, 255, 0.12);
  }
  .bottom-expression .emoji { font-size: 14px; }

  /* ══════════════════════════════════════════════════════
     模式切换按钮
     ══════════════════════════════════════════════════════ */
  .mode-toggle {
    position: absolute; top: 20px; right: 24px;
    z-index: 10;
    display: flex; gap: 8px;
  }
  .mode-btn {
    padding: 6px 14px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    color: var(--text-secondary);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .mode-btn.active {
    background: rgba(196, 160, 255, 0.15);
    border-color: rgba(196, 160, 255, 0.3);
    color: var(--text-primary);
  }
  .mode-btn:hover {
    background: rgba(255,255,255,0.08);
  }

  /* ══════════════════════════════════════════════════════
     表情快捷栏
     ══════════════════════════════════════════════════════ */
  .expression-bar {
    position: absolute; bottom: 80px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 10px;
    z-index: 10;
    padding: 8px 16px;
    background: var(--glass);
    border: 1px solid var(--border-subtle);
    border-radius: 24px;
    backdrop-filter: blur(12px);
  }
  .expr-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.03);
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .expr-btn:hover {
    background: rgba(196, 160, 255, 0.15);
    border-color: rgba(196, 160, 255, 0.25);
    transform: scale(1.1);
  }

  /* 响应式回退 */
  @media (max-width: 768px) {
    .live-stage {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr auto 56px;
    }
    .chat-sidebar { grid-row: 2; grid-column: 1; max-height: 200px; border-left: none; border-top: 1px solid var(--border-subtle); }
    .expression-bar { bottom: 270px; }
  }
</style>
</head>
<body>

<div class="live-stage">

  <!-- ══════════ 中央 Live2D 视窗 ══════════ -->
  <div class="live-viewport" id="viewport">
    <div class="live-stage-ring"></div>

    <!-- 粒子氛围 -->
    <div class="atmosphere">
      <div class="particle"></div><div class="particle"></div>
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    </div>

    <!-- 占位文字（有 Live2D 时替换为 Canvas） -->
    <div style="text-align:center; z-index:2; pointer-events:none;">
      <div style="font-size:72px; margin-bottom:16px;">🎭</div>
      <div style="font-size:14px; color:var(--text-muted); margin-bottom:4px;">Live2D 模型区域</div>
      <div style="font-size:11px; color:rgba(255,255,255,0.12);">加载模型后将在此渲染</div>
    </div>

    <!-- 表情快捷栏 -->
    <div class="expression-bar">
      <button class="expr-btn" title="默认">😶</button>
      <button class="expr-btn" title="开心">😊</button>
      <button class="expr-btn" title="害羞">😳</button>
      <button class="expr-btn" title="惊讶">😮</button>
      <button class="expr-btn" title="生气">😤</button>
      <button class="expr-btn" title="难过">😢</button>
      <button class="expr-btn" title="星星眼">🤩</button>
      <button class="expr-btn" title="晕">😵</button>
    </div>

    <!-- LIVE 角标 -->
    <div class="live-badge">
      <div class="live-dot"></div>
      <span class="live-text">LIVE</span>
      <span class="live-viewers">· Mirror</span>
    </div>

    <!-- 模式切换 -->
    <div class="mode-toggle">
      <button class="mode-btn" disabled>🧑‍💻 开发</button>
      <button class="mode-btn active">🎬 LIVE</button>
    </div>
  </div>

  <!-- ══════════ 右侧聊天栏 ══════════ -->
  <div class="chat-sidebar">
    <div class="chat-header">💬 对话</div>
    <div class="chat-stream" id="chatStream">
      <div class="chat-msg user">
        <div class="role-tag">MIRROR</div>
        hhh 今天好累，帮我看看 bridge 目录下有什么
      </div>
      <div class="chat-msg assistant">
        <div class="role-tag">澪号</div>
        等下，我看看（）<br>bridge 下面有 handlers、dispatcher、protocol... 还挺全的
      </div>
      <div class="chat-msg user">
        <div class="role-tag">MIRROR</div>
        能把 watcher 那个自动重启关了吗，烦死了
      </div>
      <div class="chat-msg assistant">
        <div class="role-tag">澪号</div>
        行，已经改了。下次改扩展文件手动重启就行。
        <div class="msg-time">刚刚</div>
      </div>
    </div>
    <div class="chat-input-wrap">
      <input type="text" placeholder="发送消息..." id="chatInput">
      <button id="sendBtn">↑</button>
    </div>
  </div>

  <!-- ══════════ 底部状态栏 ══════════ -->
  <div class="bottom-bar">
    <div class="bottom-item">
      <div class="dot"></div>
      <span>已连接</span>
    </div>
    <div class="bottom-item">
      <span class="label">模型</span>
      <span>deepseek-chat</span>
    </div>
    <div class="bottom-item">
      <span class="label">模式</span>
      <span>chat</span>
    </div>
    <div class="bottom-item">
      <span class="label">记忆</span>
      <span>25 条</span>
    </div>
    <div class="bottom-item">
      <span class="label">Token</span>
      <span>3.2K / 128K</span>
    </div>
    <div class="bottom-spacer"></div>
    <div class="bottom-expression">
      <span class="emoji">😶</span>
      <span>默认</span>
    </div>
  </div>
</div>

<script>
  const stream = document.getElementById('chatStream');
  const input = document.getElementById('chatInput');
  const btn = document.getElementById('sendBtn');

  function addMsg(role, text) {
    const now = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
    const div = document.createElement('div');
    div.className = 'chat-msg ' + role;
    const tag = role === 'user' ? 'MIRROR' : '澪号';
    div.innerHTML = `<div class="role-tag">${tag}</div>${text}<div class="msg-time">${now}</div>`;
    stream.appendChild(div);
    stream.scrollTop = stream.scrollHeight;
  }

  btn.addEventListener('click', () => {
    const text = input.value.trim();
    if (!text) return;
    addMsg('user', text);
    input.value = '';

    // 模拟澪号回复
    setTimeout(() => {
      const replies = [
        'hhh 好（）',
        '等下，让我想想...',
        '嗯嗯，我知道了',
        '这个挺有意思的',
        '不确定，我查一下',
      ];
      addMsg('assistant', replies[Math.floor(Math.random() * replies.length)]);
    }, 800 + Math.random() * 1200);
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') btn.click();
  });

  // 表情按钮效果
  document.querySelectorAll('.expr-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.expr-btn').forEach(b => b.style.borderColor = '');
      btn.style.borderColor = 'rgba(196,160,255,0.4)';
      const emoji = btn.textContent.trim();
      document.querySelector('.bottom-expression .emoji').textContent = emoji;
      document.querySelector('.bottom-expression span:last-child').textContent = btn.title;
    });
  });
</script>

</body>
</html>
