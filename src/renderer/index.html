<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
<title>Personal Agent</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Titlebar ── -->
<div id="titlebar">
  <span class="dot red"></span>
  <span class="dot yellow"></span>
  <span class="dot green"></span>
  <span class="title">Personal Agent v0.1</span>
</div>

<!-- ── Main Body ── -->
<div id="main-body">

  <!-- ═══ SIDEBAR ═══ -->
  <aside id="sidebar">

    <!-- Tab Bar -->
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" data-tab="chats">💬 对话</button>
      <button class="sidebar-tab" data-tab="files">📁 工作目录</button>
    </div>

    <!-- Tab Panels -->
    <div class="sidebar-panels">

      <!-- Panel: 对话列表 -->
      <div class="panel-chats" id="panel-chats">
        <div class="sidebar-header">
          <button id="btn-new-chat">+ 新对话</button>
        </div>
        <div id="conv-list"></div>
      </div>

      <!-- Panel: 工作目录 -->
      <div class="panel-files" id="panel-files">
        <div class="workspace-header">
          <button class="btn-select-dir" id="btn-select-dir" title="选择工作目录">
            <span class="dir-icon">📂</span>
            <span class="dir-path" id="dir-path-display">D:\claude</span>
          </button>
          <button class="btn-refresh" id="btn-refresh-dir" title="刷新">↻</button>
        </div>
        <div class="file-tree" id="file-tree">
          <div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px;">
            加载中...
          </div>
        </div>
      </div>

    </div>

    <!-- Footer -->
    <div class="sidebar-footer">
      <button id="btn-open-settings">⚙ 设置</button>
      <span class="model-badge" id="current-model-badge">DeepSeek-V3</span>
    </div>
  </aside>

  <!-- ═══ CENTER ═══ -->
  <div id="center-wrapper">

    <!-- CHAT COLUMN -->
    <div id="chat-column">
      <div id="chat-messages">
        <div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:14px;flex-direction:column;gap:8px;">
          <span style="font-size:32px;opacity:0.3;">🤖</span>
          <span>Personal Agent 已就绪</span>
          <span style="font-size:12px;color:var(--text-muted)">输入消息开始对话，或点击 ⚙ 设置 API Key</span>
        </div>
      </div>

      <!-- Input -->
      <div id="input-area">
        <div class="ref-chips" id="ref-chips"></div>
        <div class="input-row">
          <textarea id="input-box" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)  从左侧文件树拖拽文件引用" rows="1"></textarea>
          <button id="btn-send">↑</button>
        </div>
        <div class="input-footer">
          <select id="model-select">
            <option value="deepseek-chat">DeepSeek-V3</option>
            <option value="deepseek-reasoner">DeepSeek-R1</option>
          </select>
          <button id="btn-clear-context">清空上下文</button>
          <span id="token-display">Tokens: 0</span>
        </div>
      </div>
    </div>

    <!-- ═══ PREVIEW PANEL (right side, slides open) ═══ -->
    <div class="preview-panel closed" id="preview-panel">
      <div class="preview-resize" id="preview-resize"></div>
      <div class="preview-header" id="preview-header">
        <div class="preview-header-actions">
          <button class="btn-close-panel" id="btn-close-panel" title="关闭预览">✕</button>
        </div>
      </div>
      <div class="preview-viewbar" id="preview-viewbar">
        <button class="view-mode-btn active" data-mode="preview">◉ 预览</button>
        <button class="view-mode-btn" data-mode="source">&lt;&gt; 源码</button>
        <span class="view-file-type" id="view-file-type"></span>
      </div>
      <div class="preview-body" id="preview-body"></div>
      <div class="preview-empty-state" id="preview-empty">
        <span style="font-size:24px;opacity:0.3;">📂</span>
        <span>点击左侧文件树中的文件即可预览</span>
      </div>
    </div>

  </div><!-- /center-wrapper -->
</div><!-- /main-body -->

<!-- ═══════ SETTINGS OVERLAY ═══════ -->
<div id="settings-overlay">
  <div id="settings-window">
    <div class="settings-titlebar">
      <span>设置</span>
      <button id="btn-close-settings">✕</button>
    </div>
    <div class="settings-body">
      <nav class="settings-nav">
        <div class="nav-section-label">核心配置</div>
        <button class="nav-item active" data-section="api"><span class="nav-icon">📡</span> API 配置</button>
        <button class="nav-item" data-section="agent"><span class="nav-icon">🤖</span> Agent 配置</button>
        <button class="nav-item" data-section="workspace"><span class="nav-icon">📁</span> 工作目录</button>
        <div class="nav-section-label">监控</div>
        <button class="nav-item" data-section="usage"><span class="nav-icon">📊</span> 用量管理</button>
        <div class="nav-section-label">其他</div>
        <button class="nav-item" data-section="appearance"><span class="nav-icon">🎨</span> 外观</button>
        <button class="nav-item" data-section="about"><span class="nav-icon">ℹ</span> 关于</button>
      </nav>
      <div class="settings-content">
        <!-- Sections injected by settings.js -->
      </div>
    </div>
  </div>
</div>

<!-- Drag ghost -->
<div class="drag-ghost" id="drag-ghost">📎</div>

<script src="app.js"></script>
<script src="chat.js"></script>
<script src="settings.js"></script>
</body>
</html>
