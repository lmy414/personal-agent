<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    user-select: none;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  #canvas-container { width: 100%; height: 100%; position: relative; }
  #status {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.5); font-size: 11px; pointer-events: none; z-index: 10;
  }
  #drag-handle {
    position: absolute; top: 0; left: 0; right: 0; height: 28px;
    cursor: grab; z-index: 10;
    -webkit-app-region: drag;
  }

  /* ── Top-right controls (gear + lock) ── */
  #top-controls {
    position: absolute; top: 6px; right: 6px; z-index: 20;
    display: flex; gap: 6px;
    opacity: 0;
    transition: opacity 0.25s ease;
    pointer-events: none;
  }
  #canvas-container:hover #top-controls {
    opacity: 1;
    pointer-events: auto;
  }

  .ctrl-btn {
    -webkit-app-region: no-drag;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.7); cursor: pointer;
    font-size: 11px; line-height: 20px; text-align: center;
    transition: all 0.2s; pointer-events: auto;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.25); color: #fff; }
  .ctrl-btn.locked { background: rgba(255,200,80,0.25); border-color: rgba(255,200,80,0.4); color: #ffd54f; }
</style>
</head>
<body>
<div id="canvas-container">
  <div id="drag-handle"></div>
  <div id="status">等待模型加载...</div>
  <div id="top-controls">
    <div class="ctrl-btn" id="lock-btn" title="锁定位置">🔓</div>
    <div class="ctrl-btn" id="gear-btn" title="设置">⚙</div>
  </div>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
