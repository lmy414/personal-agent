network.on('showPopup', function(params) {
  const desc = descriptions[params.node];
  if (!desc) { tooltip.style.display = 'none'; return; }
  tooltip.innerHTML = `<div class="title">${desc.title}</div>` +
    (desc.path ? `<div class="path">${desc.path}</div>` : '') +
    `<div class="desc">${desc.desc}</div>`;
  tooltip.style.display = 'block';
  tooltip.style.left = (params.pointer.DOM.x + 16) + 'px';
  tooltip.style.top = (params.pointer.DOM.y + 8) + 'px';
});
network.on('hidePopup', function() { tooltip.style.display = 'none'; });
network.on('doubleClick', function(params) {
  if (params.nodes.length) {
    network.focus(params.nodes[0], { scale: 1.5, animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
  }
});
