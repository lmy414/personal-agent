<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>澪号 — Code Graph Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/vis-network@9.1.6/standalone/umd/vis-network.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Fira Sans', system-ui, sans-serif;
    background: #0F172A; color: #F8FAFC;
    overflow: hidden; height: 100vh;
    display: flex;
  }
  #sidebar {
    width: 320px; flex-shrink: 0;
    background: #1E293B; border-right: 1px solid #334155;
    display: flex; flex-direction: column;
    overflow-y: auto;
  }
  #sidebar h2 {
    padding: 16px 20px;
    font-size: 18px; font-weight: 700;
    border-bottom: 1px solid #334155;
    display: flex; align-items: center; gap: 8px;
  }
  #sidebar h2 .dot { width: 8px; height: 8px; border-radius: 50%; background: #22C55E; }
  #sidebar .stat {
    display: flex; justify-content: space-between; padding: 6px 20px;
    font-size: 13px; color: #94a3b8;
  }
  #sidebar .stat span:last-child { font-family: 'Fira Code', monospace; color: #F8FAFC; }
  #sidebar .section {
    padding: 12px 20px; border-top: 1px solid #334155;
  }
  #sidebar .section h3 {
    font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 8px;
  }
  #sidebar ul { list-style: none; }
  #sidebar li {
    padding: 4px 0; font-size: 12px; color: #94a3b8;
    font-family: 'Fira Code', monospace;
    cursor: pointer; transition: color 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  #sidebar li:hover { color: #F8FAFC; }
  #sidebar li .icon { width: 14px; text-align: center; flex-shrink: 0; }
  #sidebar li.file { color: #94a3b8; }
  #sidebar li.dir  { color: #60a5fa; }
  #sidebar li.ts    { color: #60a5fa; }
  #sidebar li.tsx   { color: #a78bfa; }
  #sidebar li.css   { color: #f59e0b; }
  #sidebar li.md    { color: #34d399; }
  #sidebar li.json  { color: #fbbf24; }
  #main {
    flex: 1; position: relative;
  }
  #graph { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: absolute; z-index: 100;
    background: #1E293B; border: 1px solid #334155;
    border-radius: 8px; padding: 12px 16px;
    max-width: 300px; font-size: 13px; line-height: 1.5;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    pointer-events: none;
  }
  #tooltip .title { font-weight: 700; margin-bottom: 2px; }
  #tooltip .file { font-size: 11px; color: #64748b; font-family: 'Fira Code', monospace; }
  #tooltip .stat { font-size: 11px; color: #94a3b8; margin-top: 4px; }
  .empty-state {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: #64748b; font-size: 14px; flex-direction: column; gap: 8px;
  }
</style>
</head>
<body>

<div id="sidebar">
  <h2><span class="dot"></span> CodeGraph</h2>
  <div class="stat"><span>项目</span><span>personal-agent</span></div>
  <div class="stat"><span>总文件</span><span id="stat-files">—</span></div>
  <div class="stat"><span>总节点</span><span id="stat-nodes">—</span></div>
  <div class="stat"><span>最近同步</span><span id="stat-date">—</span></div>
  <div class="section">
    <h3>前端 (frontend/src/)</h3>
    <ul id="tree-frontend"></ul>
  </div>
  <div class="section">
    <h3>桥接 (bridge/)</h3>
    <ul id="tree-bridge"></ul>
  </div>
  <div class="section">
    <h3>扩展 (extensions/)</h3>
    <ul id="tree-extensions"></ul>
  </div>
</div>

<div id="main">
  <div id="graph"></div>
  <div id="tooltip"></div>
</div>

<script>
// ====== File tree data (static snapshot — updated via codegraph sync) ======
const fileTree = {
  frontend: [
    { name:'shell/',            type:'dir', children:[
      { name:'App.tsx',         type:'file', ext:'tsx' },
      { name:'App.css',         type:'file', ext:'css', size:'~170 行' },
      { name:'useAgent.tsx',    type:'file', ext:'tsx', size:'~650 行' },
      { name:'settings-signal.ts',type:'file',ext:'ts' },
    ]},
    { name:'registry.ts',       type:'file', ext:'ts' },
    { name:'index.tsx',         type:'file', ext:'tsx' },
    { name:'components/',       type:'dir', children:[
      { name:'glass-panel/',    type:'dir' },
      { name:'glass-input/',    type:'dir' },
      { name:'icon-button/',    type:'dir' },
      { name:'badge/',          type:'dir' },
      { name:'toggle/',         type:'dir' },
      { name:'tab-bar/',        type:'dir' },
      { name:'progress-bar/',   type:'dir' },
      { name:'spinner/',        type:'dir' },
    ]},
    { name:'extensions/',       type:'dir', children:[
      { name:'chat-renderer/',  type:'dir', size:'5 子组件' },
      { name:'session-panel/',  type:'dir' },
      { name:'tool-panel/',     type:'dir' },
      { name:'file-tree/',      type:'dir' },
      { name:'doc-preview/',    type:'dir' },
      { name:'right-panel/',    type:'dir' },
      { name:'top-menu/',       type:'dir' },
      { name:'status-bar/',     type:'dir' },
      { name:'settings-page/',  type:'dir', size:'4 Tab' },
    ]},
  ],
  bridge: [
    { name:'index.ts',          type:'file', ext:'ts' },
    { name:'protocol.ts',       type:'file', ext:'ts', size:'55 消息' },
    { name:'dispatcher.ts',     type:'file', ext:'ts', size:'27 路由' },
    { name:'pi-session.ts',     type:'file', ext:'ts' },
    { name:'db.ts',             type:'file', ext:'ts' },
    { name:'watcher.ts',        type:'file', ext:'ts' },
    { name:'handlers/',         type:'dir', children:[
      { name:'settings.ts',     type:'file', ext:'ts' },
      { name:'file.ts',         type:'file', ext:'ts' },
      { name:'session.ts',      type:'file', ext:'ts' },
      { name:'message.ts',      type:'file', ext:'ts' },
      { name:'memory.ts',       type:'file', ext:'ts' },
      { name:'memory-store.ts', type:'file', ext:'ts' },
      { name:'skills.ts',       type:'file', ext:'ts' },
    ]},
  ],
  extensions: [
    { name:'pa-mio/index.ts',   type:'file', ext:'ts', size:'v5' },
    { name:'pa-files/index.ts', type:'file', ext:'ts' },
    { name:'pa-mcp/index.ts',   type:'file', ext:'ts' },
    { name:'shared/memory-store.ts', type:'file', ext:'ts' },
  ],
};

function countFiles(tree) {
  let n = 0;
  for (const item of tree) {
    if (item.type === 'file') n++;
    if (item.children) n += countFiles(item.children);
  }
  return n;
}

function renderTree(container, tree, prefix) {
  const ul = document.getElementById(container);
  if (!ul) return;
  function walk(items, p) {
    for (const item of items) {
      const li = document.createElement('li');
      li.className = item.type === 'dir' ? 'dir' : (item.ext || 'file');
      const icon = item.type === 'dir' ? '▸' : '·';
      li.innerHTML = `<span class="icon">${icon}</span>${p}${item.name}`;
      if (item.size) li.title = item.size;
      ul.appendChild(li);
      if (item.children) walk(item.children, p + '  ');
    }
  }
  walk(tree, prefix || '');
}

const totalFiles = countFiles(fileTree.frontend) + countFiles(fileTree.bridge) + countFiles(fileTree.extensions);
document.getElementById('stat-files').textContent = totalFiles;
document.getElementById('stat-nodes').textContent = '588'; // from codegraph sync
document.getElementById('stat-date').textContent = '2026-06-06';

renderTree('tree-frontend', fileTree.frontend, '');
renderTree('tree-bridge', fileTree.bridge, '');
renderTree('tree-extensions', fileTree.extensions, '');

// ====== Vis-Network graph (high-level module dependency graph) ======
const graphNodes = new vis.DataSet([
  { id:'f-shell',    label:'Shell\nApp.tsx\nApp.css\nuseAgent', group:'frontend', shape:'box', size:40, font:{face:'Fira Code',size:11,color:'#F8FAFC'} },
  { id:'f-comps',    label:'Components\n8 组件',                group:'component', shape:'box', size:30, font:{face:'Fira Code',size:10} },
  { id:'f-chat',     label:'Chat v2\nMomoTalk',                group:'frontend', shape:'box', size:28, font:{face:'Fira Code',size:10} },
  { id:'f-settings', label:'Settings\n4 Tab',                  group:'frontend', shape:'box', size:28, font:{face:'Fira Code',size:10} },
  { id:'f-panels',   label:'Panels\nSession · Tool\nFile · Doc', group:'frontend', shape:'box', size:28, font:{face:'Fira Code',size:10} },
  { id:'ws',         label:'WS :9229\n55 协议',               group:'bridge',  shape:'diamond', size:40, font:{face:'Fira Code',size:11,color:'#fbbf24'} },
  { id:'b-core',     label:'Bridge Core\nindex · dispatcher\nprotocol · pi-session', group:'bridge', shape:'box', size:36, font:{face:'Fira Code',size:10} },
  { id:'b-data',     label:'Data\ndb · watcher',               group:'bridge', shape:'box', size:28, font:{face:'Fira Code',size:10} },
  { id:'b-handlers', label:'Handlers\n7 文件',                 group:'handler', shape:'box', size:30, font:{face:'Fira Code',size:10} },
  { id:'pi',         label:'Pi SDK\nAgent + Harness\n28 事件', group:'pi',      shape:'box', size:38, font:{face:'Fira Code',size:11,color:'#c084fc'} },
  { id:'pi-ext',     label:'Pi Extensions\npa-mio v5\npa-files · pa-mcp', group:'pi', shape:'box', size:32, font:{face:'Fira Code',size:10} },
  { id:'external',   label:'External\nDeepSeek\nMCP Servers',  group:'external', shape:'box', size:32, font:{face:'Fira Code',size:10} },
  { id:'data',       label:'Data\nSQLite · SOUL.md\nMemories · .env', group:'data', shape:'database', size:34, font:{face:'Fira Code',size:10} },
]);

const graphEdges = new vis.DataSet([
  { from:'f-shell',  to:'f-comps',    width:2, color:'#a78bfa' },
  { from:'f-shell',  to:'f-chat',     width:2, color:'#60a5fa' },
  { from:'f-shell',  to:'f-settings', width:2, color:'#60a5fa' },
  { from:'f-shell',  to:'f-panels',   width:2, color:'#60a5fa' },
  { from:'f-comps',  to:'f-settings', width:1, color:'#a78bfa', dashes:true },
  { from:'f-shell',  to:'ws',         width:3, color:'#f59e0b', dashes:true },
  { from:'ws',       to:'b-core',     width:3, color:'#f59e0b', arrows:'to' },
  { from:'b-core',   to:'b-handlers', width:2, color:'#d97706' },
  { from:'b-core',   to:'b-data',     width:2, color:'#d97706' },
  { from:'b-core',   to:'pi',         width:3, color:'#f59e0b', arrows:'to' },
  { from:'pi',       to:'pi-ext',     width:2, color:'#c084fc', arrows:'to' },
  { from:'pi',       to:'external',   width:2, color:'#34d399', dashes:true, arrows:'to' },
  { from:'b-data',   to:'data',       width:2, color:'#64748b', arrows:'to;from' },
  { from:'pi-ext',   to:'data',       width:1, color:'#8b5cf6', dashes:true },
]);

const container = document.getElementById('graph');
const data = { nodes: graphNodes, edges: graphEdges };
const options = {
  physics: { enabled: true, solver:'barnesHut', barnesHut:{ gravitationalConstant:-2000, centralGravity:0.3, springLength:180, springConstant:0.02, damping:0.3 }, stabilization:{ enabled:true, iterations:150, fit:true } },
  layout: { improvedLayout:false },
  interaction: { hover:true, zoomView:true, dragView:true, navigationButtons:true },
  edges: { smooth:{ type:'curvedCW', roundness:0.2 }, font:{ size:9, color:'#94a3b8', strokeWidth:0 } },
  groups: {
    frontend:  { color:{background:'#1e3a5f',border:'#60a5fa',highlight:{background:'#2563eb',border:'#93c5fd'}} },
    component: { color:{background:'#2e1065',border:'#a78bfa',highlight:{background:'#7c3aed',border:'#c4b5fd'}} },
    bridge:    { color:{background:'#451a03',border:'#f59e0b',highlight:{background:'#92400e',border:'#fbbf24'}} },
    handler:   { color:{background:'#422006',border:'#d97706',highlight:{background:'#78350f',border:'#f59e0b'}} },
    pi:        { color:{background:'#3b0764',border:'#c084fc',highlight:{background:'#7e22ce',border:'#d8b4fe'}} },
    external:  { color:{background:'#064e3b',border:'#34d399',highlight:{background:'#059669',border:'#6ee7b7'}} },
    data:      { color:{background:'#1c1917',border:'#64748b',highlight:{background:'#292524',border:'#94a3b8'}} },
  },
};
new vis.Network(container, data, options);
</script>
</body>
</html>
