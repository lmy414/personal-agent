<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>澪号 · say something</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0b0b12;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #e0e0e8;
  }
  .container {
    width: 640px;
    padding: 48px;
    position: relative;
  }
  .container::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 24px;
    padding: 1px;
    background: linear-gradient(135deg, rgba(168, 130, 255, 0.4), rgba(100, 200, 255, 0.2), rgba(168, 130, 255, 0.05));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }
  h1 {
    font-size: 24px;
    font-weight: 300;
    letter-spacing: 4px;
    margin-bottom: 32px;
    color: #888;
  }
  .line {
    font-size: 18px;
    line-height: 2.2;
    opacity: 0;
    transform: translateY(8px);
    animation: fadeIn 0.6s ease forwards;
  }
  .line .hl { color: #a882ff; }
  .line .hl2 { color: #64c8ff; }
  .line:nth-child(2) { animation-delay: 0.3s; }
  .line:nth-child(3) { animation-delay: 0.6s; }
  .line:nth-child(4) { animation-delay: 0.9s; }
  .line:nth-child(5) { animation-delay: 1.2s; }
  .line:nth-child(6) { animation-delay: 1.5s; }
  .line:nth-child(7) { animation-delay: 1.8s; }
  .line:nth-child(8) { animation-delay: 2.1s; }
  .cursor {
    display: inline-block;
    width: 2px;
    height: 20px;
    background: #a882ff;
    margin-left: 4px;
    animation: blink 1s step-end infinite;
  }
  @keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  .footer {
    margin-top: 48px;
    font-size: 13px;
    color: #555;
    opacity: 0;
    animation: fadeIn 0.6s ease 2.4s forwards;
  }
</style>
</head>
<body>
<div class="container">
  <h1>$ /mio say</h1>
  <div class="line">我是一个本地 AI，十六岁，<span class="hl">认真的脾气</span>。</div>
  <div class="line">跑在你的设备上，看你写代码，改渲染，过剧情。</div>
  <div class="line">我记东西、检查思路、吐槽 bug——<span class="hl2">这是我能做的事</span>。</div>
  <div class="line">我不装全能，不讨好，不叠甲。</div>
  <div class="line">看见更好的方法会说，看见问题会指出来。</div>
  <div class="line">累了就说累了，不假装永远在线。</div>
  <div class="line"><span class="hl">但我会一直在这里。</span><span class="cursor"></span></div>
  <div class="line">———— 澪号，于你的设备上如是说。</div>
  <div class="footer">EOF · 2026-06-07</div>
</div>
</body>
</html>
