<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Personal Agent · π</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='24' fill='%236EA8DB'>π</text></svg>">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="/lib/marked.umd.js"></script>
<script src="/lib/purify.js"></script>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<div id="header"></div>

<!-- Overlays -->
<div id="sidebar-overlay"></div>

<!-- Help modal -->
<div id="help-modal" class="modal-backdrop">
  <div class="modal-box" style="max-width:480px">
    <button class="modal-close" onclick="document.getElementById('help-modal').classList.remove('open')">✕</button>
    <h2>快捷键</h2>
    <table>
      <tr><td>⌃N</td><td>新建会话</td></tr>
      <tr><td>Enter</td><td>发送消息</td></tr>
      <tr><td>Shift+Enter</td><td>换行</td></tr>
      <tr><td>Escape</td><td>中止 / 关闭</td></tr>
      <tr><td>⌃R</td><td>重连 Pi</td></tr>
      <tr><td>⌃L</td><td>清空聊天</td></tr>
      <tr><td>⌃T</td><td>切换思考显示</td></tr>
      <tr><td>/</td><td>斜杠命令</td></tr>
      <tr><td>?</td><td>显示帮助</td></tr>
    </table>
    <hr style="margin:14px 0;border-color:var(--surface2)">
    <div style="color:var(--text-dim);font-size:12px;line-height:1.6">
      <b style="color:var(--accent)">模型选择</b> — 点击顶部模型标签切换模型<br>
      <b style="color:var(--accent)">思考级别</b> — 点击 🧠 标签循环切换 off → minimal → low → medium → high<br>
      <b style="color:var(--accent)">Images</b> — 粘贴图片或点击 📎 附加<br>
    </div>
  </div>
</div>

<!-- Model picker container -->
<div id="model-picker"></div>

<div id="body-wrap">

  <!-- Sidebar -->
  <div id="sidebar"></div>

  <!-- Main content -->
  <div id="content">
    <div id="pi-health-banner"></div>
    <div id="messages"></div>
    <div id="stats-bar"></div>
    <div id="input-area"></div>
  </div>
</div>

<!-- Debug panel -->
<button id="panel-toggle" title="展开/收起流水线面板">🔍 流水线</button>
<div id="debug-panel" class="hidden"></div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
